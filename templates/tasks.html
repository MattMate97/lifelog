<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - LifeLog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>LifeLog</h1>
        <p>Your personal life dashboard</p>
        <a href="/" class="back-link">← Back to dashboard</a>
    </header>

    <main>
        <h2>Tasks</h2>

        <form action="/tasks/add" method="POST" class="add-form">
            <input type="text" name="title" placeholder="Add a new task..." required>
            <button type="submit">Add</button>
        </form>

        <ul class="task-list">
            {% for task in tasks %}
            <li class="task-item {% if task['done'] %}done{% endif %}">
                <span>{{ task['title'] }}</span>
                <div class="task-actions">
                    {% if not task['done'] %}
                    <a href="/tasks/complete/{{ task['id'] }}">✅ Complete</a>
                    {% endif %}
                    <a href="/tasks/delete/{{ task['id'] }}">🗑️ Delete</a>
                </div>
            </li>
            {% endfor %}
        </ul>
    </main>
</body>
</html>
